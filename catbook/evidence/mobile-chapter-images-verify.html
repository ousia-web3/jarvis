<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mobile Chapter Image Verification</title>
    <style>
      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: start center;
        padding: 24px;
        background: #edf1f7;
        font-family: system-ui, sans-serif;
      }

      iframe {
        width: 400px;
        max-width: 100%;
        height: 900px;
        border: 1px solid rgba(28, 30, 33, 0.14);
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 16px 40px rgba(28, 30, 33, 0.16);
      }
    </style>
  </head>
  <body>
    <iframe
      id="phone"
      title="400px mobile verification frame"
      src="../web/manuscript.html?chapter-images=20260604#chapter-1"
    ></iframe>
    <script>
      const phone = document.querySelector("#phone");

      phone.addEventListener("load", () => {
        window.setTimeout(() => {
          phone.contentWindow?.scrollBy(0, 108);
        }, 700);
      });
    </script>
  </body>
</html>
