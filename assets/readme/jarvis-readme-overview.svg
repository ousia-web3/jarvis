<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Jarvis AI agent team overview</title>
  <desc id="desc">A visual overview of Jarvis: one request becomes brief, strategy, tasks, execution, risk review, memory, and done.</desc>
  <rect width="1200" height="620" rx="28" fill="#f6f7f4"/>
  <rect x="28" y="28" width="1144" height="564" rx="24" fill="#ffffff" stroke="#cbd4d2" stroke-width="2"/>

  <text x="72" y="92" fill="#1f2528" font-family="Segoe UI, Noto Sans KR, Arial, sans-serif" font-size="34" font-weight="700">Jarvis AI 에이전트 팀 운영체계</text>
  <text x="72" y="130" fill="#5d686d" font-family="Segoe UI, Noto Sans KR, Arial, sans-serif" font-size="18">한 줄 요청을 전략, 실행, 검증, 기억까지 닫는 로컬 AI 팀 운영 시스템</text>

  <g transform="translate(72 176)">
    <rect width="196" height="128" rx="16" fill="#eef3f1" stroke="#2f6f5e" stroke-width="2"/>
    <text x="24" y="42" fill="#2f6f5e" font-family="Segoe UI, Noto Sans KR, Arial, sans-serif" font-size="16" font-weight="700">INPUT</text>
    <text x="24" y="76" fill="#1f2528" font-family="Segoe UI, Noto Sans KR, Arial, sans-serif" font-size="24" font-weight="700">한 줄 요청</text>
    <text x="24" y="106" fill="#5d686d" font-family="Segoe UI, Noto Sans KR, Arial, sans-serif" font-size="15">목표만 말하면 시작</text>
  </g>

  <g transform="translate(314 176)">
    <rect width="196" height="128" rx="16" fill="#eef2f7" stroke="#315b7d" stroke-width="2"/>
    <text x="24" y="42" fill="#315b7d" font-family="Segoe UI, Noto Sans KR, Arial, sans-serif" font-size="16" font-weight="700">PLAN</text>
    <text x="24" y="76" fill="#1f2528" font-family="Segoe UI, Noto Sans KR, Arial, sans-serif" font-size="24" font-weight="700">전략과 분해</text>
    <text x="24" y="106" fill="#5d686d" font-family="Segoe UI, Noto Sans KR, Arial, sans-serif" font-size="15">Jarvis + Friday</text>
  </g>

  <g transform="translate(556 176)">
    <rect width="196" height="128" rx="16" fill="#fbf4e8" stroke="#986c23" stroke-width="2"/>
    <text x="24" y="42" fill="#986c23" font-family="Segoe UI, Noto Sans KR, Arial, sans-serif" font-size="16" font-weight="700">BUILD</text>
    <text x="24" y="76" fill="#1f2528" font-family="Segoe UI, Noto Sans KR, Arial, sans-serif" font-size="24" font-weight="700">실무 실행</text>
    <text x="24" y="106" fill="#5d686d" font-family="Segoe UI, Noto Sans KR, Arial, sans-serif" font-size="15">EVE · Joi · TARS · C3PO</text>
  </g>

  <g transform="translate(798 176)">
    <rect width="196" height="128" rx="16" fill="#f7eeee" stroke="#9a463d" stroke-width="2"/>
    <text x="24" y="42" fill="#9a463d" font-family="Segoe UI, Noto Sans KR, Arial, sans-serif" font-size="16" font-weight="700">SHIELD</text>
    <text x="24" y="76" fill="#1f2528" font-family="Segoe UI, Noto Sans KR, Arial, sans-serif" font-size="24" font-weight="700">리스크 검토</text>
    <text x="24" y="106" fill="#5d686d" font-family="Segoe UI, Noto Sans KR, Arial, sans-serif" font-size="15">Data · KITT/TRON</text>
  </g>

  <path d="M276 240 H306" stroke="#9aa6aa" stroke-width="3" stroke-linecap="round"/>
  <path d="M306 240 l-10 -7 v14 z" fill="#9aa6aa"/>
  <path d="M518 240 H548" stroke="#9aa6aa" stroke-width="3" stroke-linecap="round"/>
  <path d="M548 240 l-10 -7 v14 z" fill="#9aa6aa"/>
  <path d="M760 240 H790" stroke="#9aa6aa" stroke-width="3" stroke-linecap="round"/>
  <path d="M790 240 l-10 -7 v14 z" fill="#9aa6aa"/>

  <g transform="translate(72 356)">
    <rect width="300" height="128" rx="16" fill="#f2f0f7" stroke="#62518a" stroke-width="2"/>
    <text x="24" y="42" fill="#62518a" font-family="Segoe UI, Noto Sans KR, Arial, sans-serif" font-size="16" font-weight="700">MEMORY</text>
    <text x="24" y="76" fill="#1f2528" font-family="Segoe UI, Noto Sans KR, Arial, sans-serif" font-size="24" font-weight="700">Work Log + Episodic Memory</text>
    <text x="24" y="106" fill="#5d686d" font-family="Segoe UI, Noto Sans KR, Arial, sans-serif" font-size="15">요청, 증거, 회고가 남습니다</text>
  </g>

  <g transform="translate(418 356)">
    <rect width="300" height="128" rx="16" fill="#eef3f1" stroke="#2f6f5e" stroke-width="2"/>
    <text x="24" y="42" fill="#2f6f5e" font-family="Segoe UI, Noto Sans KR, Arial, sans-serif" font-size="16" font-weight="700">OBSERVE</text>
    <text x="24" y="76" fill="#1f2528" font-family="Segoe UI, Noto Sans KR, Arial, sans-serif" font-size="24" font-weight="700">Dashboard + Event Log</text>
    <text x="24" y="106" fill="#5d686d" font-family="Segoe UI, Noto Sans KR, Arial, sans-serif" font-size="15">To/CC와 진행 상태를 봅니다</text>
  </g>

  <g transform="translate(764 356)">
    <rect width="300" height="128" rx="16" fill="#142026"/>
    <text x="24" y="42" fill="#f0f5f3" font-family="Segoe UI, Noto Sans KR, Arial, sans-serif" font-size="16" font-weight="700">DONE</text>
    <text x="24" y="76" fill="#ffffff" font-family="Segoe UI, Noto Sans KR, Arial, sans-serif" font-size="24" font-weight="700">검증 + 기억 + 게이트</text>
    <text x="24" y="106" fill="#cbd4d2" font-family="Segoe UI, Noto Sans KR, Arial, sans-serif" font-size="15">말이 아니라 통과 상태로 완료</text>
  </g>

  <text x="72" y="546" fill="#5d686d" font-family="Segoe UI, Noto Sans KR, Arial, sans-serif" font-size="16">운영 본체: 역할 라우팅과 승인 흐름 · 관찰 하네스: 대시보드와 이벤트 로그 · 실행 하네스: Dynamic Workflow</text>
</svg>
